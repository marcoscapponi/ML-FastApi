version: '3.8'
services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ml-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
       condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./src/models/artifacts:/app/src/models/artifacts
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
  db:
    image: postgres:16-alpine
    container_name: ml-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ml_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ml_api"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: