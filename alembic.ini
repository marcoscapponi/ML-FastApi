# Configuracion de Alembic para la gestión de migraciones de la base de datos

[alembic]
# Ruta al directorio de migraciones
script_location = alembic

# La URL la sobreescribimos en env.py para usar variables de entorno
sqlalchemy.url = driver://user:pass@localhost/db

# Logging
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S